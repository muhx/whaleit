# WhaleIt - Production Docker Compose
#
# Usage: docker compose up -d
# Dev overlay: docker compose -f compose.yml -f compose.dev.yml up
#
# Works with any reverse proxy (Coolify, Nginx, Caddy, Traefik).
# Uses expose (not ports) — proxy handles external traffic.

services:
  postgres:
    image: postgres:17-alpine
    container_name: whaleit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whaleit
      POSTGRES_USER: whaleit
      POSTGRES_PASSWORD: "${WF_PG_PASSWORD:?Set WF_PG_PASSWORD}"
    volumes:
      - whaleit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whaleit"]
      interval: 5s
      timeout: 5s
      retries: 5

  whaleit:
    image: muhx/whaleit:latest
    container_name: whaleit
    restart: unless-stopped
    expose:
      - "8088"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - whaleit-data:/data
    environment:
      WF_LISTEN_ADDR: "0.0.0.0:8088"
      # PostgreSQL database URL for production deployments
      DATABASE_URL: "postgres://whaleit:${WF_PG_PASSWORD}@postgres:5432/whaleit"
      WF_PG_POOL_SIZE: "${WF_PG_POOL_SIZE:-8}"
      # Required — generate with: openssl rand -base64 32
      WF_SECRET_KEY: "${WF_SECRET_KEY:?Set WF_SECRET_KEY}"

      # ── Authentication ────────────────────────────────────────────────
      # Required when listening on 0.0.0.0 (the default for Docker).
      # Provide an Argon2id PHC hash of your password.
      #
      # IMPORTANT — the hash contains "$" signs that need escaping:
      #   .env file  → WF_AUTH_PASSWORD_HASH=$argon2id$v=19$...  (no quotes, no escaping)
      #   YAML inline → WF_AUTH_PASSWORD_HASH: '$$argon2id$$v=19$$...'  (double every $)
      #
      # Generate a hash:
      #   printf 'your-password' | argon2 yoursalt16chars! -id -e
      #
      # If a reverse proxy handles auth instead, set WF_AUTH_REQUIRED: "false"
      # and leave WF_AUTH_PASSWORD_HASH empty.
      WF_AUTH_PASSWORD_HASH: "${WF_AUTH_PASSWORD_HASH:-}"
      WF_AUTH_TOKEN_TTL_MINUTES: "${WF_AUTH_TOKEN_TTL_MINUTES:-60}"
      # Set to "false" to skip the auth requirement (e.g. reverse proxy handles auth)
      # WF_AUTH_REQUIRED: "true"

      # Required when auth is enabled — set to your app's origin, e.g. https://whaleit.example.com
      WF_CORS_ALLOW_ORIGINS: "${WF_CORS_ALLOW_ORIGINS}"
      WF_REQUEST_TIMEOUT_MS: "${WF_REQUEST_TIMEOUT_MS:-30000}"
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8088/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M

volumes:
  whaleit-data:
    driver: local
  whaleit-pgdata:
    driver: local
