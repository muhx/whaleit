name: PR Check

on:
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package types
        run: pnpm run build:types

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: whaleit_test
          POSTGRES_USER: whaleit_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev libpq-dev

      - name: Create dist folder for Tauri context
        run:
          mkdir -p dist && echo '<!DOCTYPE html><html><head></head><body></body></html>' >
          dist/index.html

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        env:
          DATABASE_URL: postgres://whaleit_test:test_password@localhost:5432/whaleit_test

      - name: Test
        run: cargo test --workspace
        env:
          DATABASE_URL: postgres://whaleit_test:test_password@localhost:5432/whaleit_test
          CONNECT_API_URL: http://test.local

      - name: Parity tests
        run: cargo test -p whaleit-storage-postgres --test parity_tests -- --include-ignored --test-threads=1
        env:
          DATABASE_URL: postgres://whaleit_test:test_password@localhost:5432/whaleit_test
          CONNECT_API_URL: http://test.local

      - name: Check release build
        run: cargo check -p whaleit-server --release
        env:
          DATABASE_URL: postgres://whaleit_test:test_password@localhost:5432/whaleit_test

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [frontend-check, rust-check]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.frontend-check.result }}" == "failure" ]] || [[ "${{ needs.rust-check.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          elif [[ "${{ needs.frontend-check.result }}" == "cancelled" ]] || [[ "${{ needs.rust-check.result }}" == "cancelled" ]]; then
            echo "⚠️ Build was cancelled"
            exit 1
          else
            echo "✅ All checks passed"
          fi
