# WhaleIt - Development overrides
#
# Usage: docker compose -f compose.yml -f compose.dev.yml up

services:
  postgres:
    ports:
      - "${WF_PG_PORT:-5432}:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "${WF_BACKEND_PORT:-8088}:8088"
    expose: !reset []
    read_only: false
    security_opt: !reset []
    deploy: !reset {}
    environment:
      WF_LISTEN_ADDR: "0.0.0.0:8088"
      DATABASE_URL: "postgres://whaleit:${WF_PG_PASSWORD:-password}@postgres:5432/whaleit"
      WF_SECRET_KEY: "${WF_SECRET_KEY:?Set WF_SECRET_KEY}"
      WF_MULTI_USER_AUTH: "true"
      WF_CORS_ALLOW_ORIGINS: "http://localhost:1420,http://localhost:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${WF_PORT:-80}:80"
