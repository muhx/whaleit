<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="200" fill="#3d8778"/>
  
  <!-- Whale body -->
  <ellipse cx="490" cy="540" rx="260" ry="190" fill="#eef5f3" />
  
  <!-- Whale belly (lighter overlay) -->
  <ellipse cx="490" cy="580" rx="200" ry="130" fill="#d5e8e3" />
  
  <!-- Whale tail -->
  <path d="M720 490 C770 440, 830 350, 810 300 C790 340, 740 400, 720 430 C730 380, 760 320, 740 280 C720 340, 710 410, 700 460 Z" fill="#eef5f3" />
  
