  <circle cx="310" cy="460" r="22" fill="#162228" />
  <circle cx="316" cy="454" r="7" fill="#f6faf8" />
  
  <!-- Smile -->
  <path d="M300 520 Q340 555 385 530" stroke="#285a50" stroke-width="8" fill="none" stroke-linecap="round" />
  
  <!-- Water spout -->
  <path d="M380 340 Q370 300 360 260" stroke="#d5e8e3" stroke-width="14" fill="none" stroke-linecap="round" />
  <path d="M400 345 Q395 300 405 250" stroke="#d5e8e3" stroke-width="14" fill="none" stroke-linecap="round" />
  <path d="M420 348 Q420 305 430 260" stroke="#d5e8e3" stroke-width="14" fill="none" stroke-linecap="round" />
  
  <!-- Water spout drops -->
  <circle cx="355" cy="245" r="10" fill="#d5e8e3" />
  <circle cx="405" cy="238" r="12" fill="#d5e8e3" />
  <circle cx="435" cy="248" r="10" fill="#d5e8e3" />
  
  <!-- Fin (top) -->
  <path d="M450 370 Q460 320 490 340 Q470 360 465 385 Z" fill="#a5cec3" />
  
  <!-- Waves at bottom -->
  <path d="M150 700 Q250 670 350 700 Q450 730 550 700 Q650 670 750 700 Q850 730 900 700 L900 1024 L100 1024 Q125 700 150 700 Z" fill="#285a50" opacity="0.3" />
  <path d="M100 740 Q200 710 300 740 Q400 770 500 740 Q600 710 700 740 Q800 770 900 740 L900 1024 L100 1024 Z" fill="#1f463e" opacity="0.25" />
